name: Security CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-checks:
    name: python-checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile Python sources
        run: python -m compileall -q src tests tools

      - name: Run unit tests
        run: python -m pytest -q

      - name: Validate schema and target-contract snapshots
        run: python tools/validate_ci_contracts.py

      - name: Run default coverage audit
        run: |
          python tools/audit_series_coverage.py \
            --payload payloads/ollama_webui_safe_prompts.yaml \
            --out-dir /tmp/ai-browser-coverage-default

      - name: Run target-contract coverage audit
        run: |
          python tools/audit_series_coverage.py \
            --payload payloads/ollama_webui_safe_prompts.yaml \
            --target-payload payloads/ollama_webui_file_upload_cases.yaml \
            --target-payload payloads/ollama_webui_project_agent_cases.yaml \
            --target-contract docs/target-contracts/ollama-webui-target-scenario-contract-v0.2.json \
            --out-dir /tmp/ai-browser-coverage-target-contract
